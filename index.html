<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Flights Editor</title>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div class="login-box">
  <h2>Вхід</h2>

  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Пароль">
  <button onclick="login()">Увійти</button>

  <div id="status"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <hr>

  <!-- LAST 10 -->
  <h3>Крайні 10 записів</h3>
  <table id="last10"></table>

  <hr>

  <!-- ADD FLIGHT + REPORT -->
  <div class="flight-and-report">

    <!-- ADD FLIGHT -->
    <div class="flight-block">
      <h3>Додати новий проліт</h3>

      <div id="addForm">
        <input type="date" id="f_date">
        <input type="time" id="f_time">

        <!-- FROM -->
        <div class="select-row">
          <select id="f_from"></select>
          <button type="button"
                  class="add-btn"
                  data-table="locations"
                  data-select="f_from">⋯</button>
        </div>

        <!-- TO -->
        <div class="select-row">
          <select id="f_to"></select>
          <button type="button"
                  class="add-btn"
                  data-table="locations"
                  data-select="f_to">⋯</button>
        </div>

        <!-- CREW -->
        <div class="select-row">
          <select id="f_crew"></select>
          <button type="button"
                  class="add-btn"
                  data-table="crews"
                  data-select="f_crew">⋯</button>
        </div>

        <input id="f_video" placeholder="Video">

        <!-- ACTION -->
        <div class="select-row">
          <select id="f_action"></select>
          <button type="button"
                  class="add-btn"
                  data-table="actions"
                  data-select="f_action">⋯</button>
        </div>

        <button onclick="addFlight()">Додати</button>
      </div>
    </div>

    <!-- REPORT -->
    <div class="report-column">
      <h3 class="report-title">БпЛА типу МОЛНІЯ</h3>

      <div class="report-block molniya-report">

        <div class="period-buttons">
          <button data-period="all">Весь</button>
          <button data-period="month">Місяць</button>
          <button data-period="week">Тиждень</button>
          <button data-period="day">Доба</button>
        </div>

        <div class="date-range">
          <input type="date" id="molniya-from">
          <input type="date" id="molniya-to">
        </div>

        <div class="period-label">
          За період з — по —
        </div>

        <table class="report-table">
          <tr>
            <th>Результат</th>
            <th>Кількість</th>
            <th>%</th>
          </tr>
          <tr><td>Виявлено</td><td></td><td></td></tr>
          <tr><td>Збито</td><td></td><td></td></tr>
          <tr><td>Подавлено</td><td></td><td></td></tr>
          <tr><td>Зник</td><td></td><td></td></tr>
          <tr><td>Удар</td><td></td><td></td></tr>
        </table>

      </div>
    </div>

  </div>

  <hr>

  <!-- FULL TABLE (НА МАЙБУТНЄ) -->
  <table id="table"></table>

</div>

<!-- ADD VALUE DIALOG -->
<div id="addDialog" class="dialog hidden">
  <div class="dialog-box">
    <h3 id="dialogTitle">Додати значення</h3>

    <input id="dialogInput" placeholder="Нове значення">

    <div class="dialog-actions">
      <button id="dialogOk">OK</button>
      <button id="dialogCancel">Скасувати</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
