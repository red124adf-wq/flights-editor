<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Flights Editor</title>

  <!-- Supabase UMD -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">
  <h2>Вхід</h2>

  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Пароль">
  <button onclick="login()">Увійти</button>

  <div id="status"></div>
</div>

<hr>

<h3>Крайні 10 записів</h3>
<table id="last10"></table>

<hr>

<h3>Додати новий проліт</h3>

<div id="addForm">
  <input type="date" id="f_date">
  <input type="time" id="f_time">

  <select id="f_from"></select>
  <select id="f_to"></select>
  <select id="f_crew"></select>

  <input placeholder="Video" id="f_video">

  <select id="f_action"></select>

  <button onclick="addFlight()">Додати</button>
</div>

<hr>

<script src="app.js"></script>

</body>
</html>
