<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Flights Editor</title>

  <!-- ПРАВИЛЬНЕ підключення Supabase (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    th { background: #eee; }
    input { display:block; margin-bottom:6px; width:300px; }
    button { padding: 6px 12px; }
  </style>
</head>
<body>
<!-- PAGES SYNC TEST 2026-01-11 -->
<h2>Вхід</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">
<button onclick="login()">Увійти</button>

<div id="status" style="margin-top:10px;font-weight:bold;"></div>

<hr>

<h2>Flights</h2>
<button onclick="loadData()">Оновити</button>
<table id="table"></table>

<script>
/* 1. Створюємо клієнт */
const supabaseClient = window.supabase.createClient(
  "https://opuosltpihrhnpyxcxnm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wdW9zbHRwaWhyaG5weXhjeG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNTM4NjgsImV4cCI6MjA4MzYyOTg2OH0.3oLcak4XWxEFaP81HrzCss9BwekV6HoNB--82Zp3-uE"
);

/* 2. LOGIN */
window.login = async function () {
  const status = document.getElementById("status");
  status.innerText = "⏳ Вхід…";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    status.innerText = "❌ " + error.message;
    return;
  }

  status.innerText = "✅ Вхід успішний";
  loadData();
};

/* 3. LOAD DATA */
window.loadData = async function () {
  const { data, error } = await supabaseClient
    .from("flights")
    .select("*")
    .order("id");

  if (error) {
    alert(error.message);
    return;
  }

  const table = document.getElementById("table");
  table.innerHTML = "";

  if (!data || data.length === 0) return;

  const headers = Object.keys(data[0]);
  table.innerHTML =
    "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

  data.forEach(row => {
    table.innerHTML +=
      "<tr>" +
      headers.map(h =>
        `<td contenteditable onblur="save(${row.id}, '${h}', this.innerText)">
          ${row[h] ?? ""}
        </td>`
      ).join("") +
      "</tr>";
  });
};

/* 4. SAVE */
window.save = async function (id, field, value) {
  await supabaseClient
    .from("flights")
    .update({ [field]: value })
    .eq("id", id);
};
</script>

</body>
</html>
