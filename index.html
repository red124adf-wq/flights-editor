<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Flights Editor</title>

  <!-- Supabase UMD -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    th { background: #eee; }
    input { display:block; margin-bottom:6px; width:300px; }
    button { padding: 6px 12px; }
    .readonly td { background:#fafafa; }
  </style>
</head>

<body>
<!-- PAGES SYNC TEST -->

<h2>Вхід</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">
<button onclick="login()">Увійти</button>

<div id="status" style="margin-top:10px;font-weight:bold;"></div>

<hr>

<h3>Останні 10 записів</h3>
<table id="last10"></table>

<hr>

<h3>Додати новий рейс</h3>
<div id="addForm">
  <input type="date" id="f_date">
  <input type="time" id="f_time">
  <input placeholder="Звідки" id="f_from">
  <input placeholder="Куди" id="f_to">
  <input placeholder="Екіпаж" id="f_crew">
  <input placeholder="Video" id="f_video">
  <input placeholder="Action" id="f_action">
  <button onclick="addFlight()">Додати</button>
</div>

<hr>

<h2>Flights (вся таблиця)</h2>
<button onclick="loadData()">Оновити</button>
<table id="table"></table>

<script>
/* SUPABASE CLIENT */
const supabaseClient = window.supabase.createClient(
  "https://opuosltpihrhnpyxcxnm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wdW9zbHRwaWhyaG5weXhjeG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNTM4NjgsImV4cCI6MjA4MzYyOTg2OH0.3oLcak4XWxEFaP81HrzCss9BwekV6HoNB--82Zp3-uE"
);

/* LOGIN */
window.login = async function () {
  const status = document.getElementById("status");
  status.innerText = "⏳ Вхід…";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if (error) {
    status.innerText = "❌ " + error.message;
    return;
  }

  status.innerText = "✅ Вхід успішний";
  loadLast10();
  loadData();
};

/* LAST 10 RECORDS */
window.loadLast10 = async function () {
  const { data, error } = await supabaseClient
    .from("flights")
    .select("date, time, from_m, to_t, crew, video, action")
    .order("date", { ascending: false })
    .order("time", { ascending: false })
    .limit(10);

  if (error) {
    console.error(error);
    return;
  }

  const table = document.getElementById("last10");
  table.innerHTML = "";

  if (!data || data.length === 0) return;

  const columns = [
    { key: "date", label: "Дата" },
    { key: "time", label: "Час" },
    { key: "from_m", label: "Звідки" },
    { key: "to_t", label: "Куди" },
    { key: "crew", label: "Екіпаж" },
    { key: "video", label: "Відео" },
    { key: "action", label: "Дії" }
  ];

  /* Заголовок */
  table.innerHTML =
    "<tr>" +
    columns.map(c => `<th>${c.label}</th>`).join("") +
    "</tr>";

  /* Рядки */
  data.forEach(row => {
    table.innerHTML +=
      "<tr class='readonly'>" +
      columns.map(c => `<td>${row[c.key] ?? ""}</td>`).join("") +
      "</tr>";
  });
};


/* ADD NEW FLIGHT */
window.addFlight = async function () {
  const payload = {
    date: f_date.value,
    time: f_time.value,
    from_m: f_from.value,
    to_t: f_to.value,
    crew: f_crew.value,
    video: f_video.value,
    action: f_action.value
  };

  const { error } = await supabaseClient
    .from("flights")
    .insert(payload);

  if (error) {
    alert(error.message);
    return;
  }

  document.querySelectorAll("#addForm input").forEach(i => i.value = "");
  loadLast10();
  loadData();
};

/* SAVE CELL */
window.save = async function (id, field, value) {
  await supabaseClient
    .from("flights")
    .update({ [field]: value })
    .eq("id", id);
};
</script>

</body>
</html>
