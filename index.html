<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Flights Editor</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    th { background: #eee; }
    input { width: 100%; }
    button { padding: 6px 12px; }
  </style>
</head>
<body>

<h2>Вхід</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">
<button onclick="login()">Увійти</button>

<hr>

<h2>Flights</h2>
<button onclick="loadData()">Оновити</button>
<table id="table"></table>

<script>
const supabase = supabase.createClient(
  "PASTE_PROJECT_URL",
  "PASTE_ANON_KEY"
);

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (error) alert(error.message);
  else loadData();
}

async function loadData() {
  const { data, error } = await supabase
    .from("flights")
    .select("*")
    .order("id");
  if (error) return alert(error.message);

  const table = document.getElementById("table");
  table.innerHTML = "";

  if (data.length === 0) return;

  const headers = Object.keys(data[0]);
  table.innerHTML += "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

  data.forEach(row => {
    table.innerHTML += "<tr>" + headers.map(h =>
      `<td contenteditable onblur="save(${row.id}, '${h}', this.innerText)">${row[h] ?? ""}</td>`
    ).join("") + "</tr>";
  });
}

async function save(id, field, value) {
  await supabase.from("flights").update({ [field]: value }).eq("id", id);
}
</script>

</body>
</html>
