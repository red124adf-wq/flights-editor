<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Flights Editor</title>

  <!-- Supabase UMD -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div class="login-box">
  <h2>Вхід</h2>

  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Пароль">
  <button onclick="login()">Увійти</button>

  <div id="status"></div>
</div>

<!-- APP (HIDDEN UNTIL LOGIN) -->
<div id="app" class="hidden">

  <hr>

  <!-- LAST 10 -->
  <h3>Крайні 10 записів</h3>
  <table id="last10"></table>

  <hr>

  <!-- ADD FLIGHT -->
  <h3>Додати новий проліт</h3>

  <div id="addForm">

    <input type="date" id="f_date">
    <input type="time" id="f_time">

    <!-- FROM (locations) -->
    <div class="select-row">
      <select id="f_from"></select>
      <button type="button"
              class="add-btn"
              data-table="locations"
              data-select="f_from">⋯</button>
    </div>

    <!-- TO (locations) -->
    <div class="select-row">
      <select id="f_to"></select>
      <button type="button"
              class="add-btn"
              data-table="locations"
              data-select="f_to">⋯</button>
    </div>

    <!-- CREW (crews) -->
    <div class="select-row">
      <select id="f_crew"></select>
      <button type="button"
              class="add-btn"
              data-table="crews"
              data-select="f_crew">⋯</button>
    </div>

    <input placeholder="Video" id="f_video">

    <!-- ACTION (actions) -->
    <div class="select-row">
      <select id="f_action"></select>
      <button type="button"
              class="add-btn"
              data-table="actions"
              data-select="f_action">⋯</button>
    </div>

    <button onclick="addFlight()">Додати</button>
  </div>

  <hr>

  <!-- FULL TABLE -->
  <table id="table"></table>

</div>

<!-- ADD VALUE DIALOG -->
<div id="addDialog" class="dialog hidden">
  <div class="dialog-box">
    <h3 id="dialogTitle">Додати значення</h3>

    <input id="dialogInput" placeholder="Нове значення">

    <div class="dialog-actions">
      <button id="dialogOk">OK</button>
      <button id="dialogCancel">Скасувати</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
