<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Звіт по БпЛА</title>

  <link rel="stylesheet" href="report.css">

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<h1>Звіт по ворожим БпЛА</h1>

<div class="report-period" id="periodInfo"></div>

<div class="tables">

  <!-- МОЛНІЯ -->
  <div class="table-box">
    <h2>БпЛА типу «МОЛНІЯ»</h2>
    <table id="table-molniya"></table>
    <div class="daily-summary" id="summary-molniya"></div>
  </div>

  <!-- ФПВ -->
  <div class="table-box">
    <h2>БпЛА типу «ФПВ»</h2>
    <table id="table-fpv"></table>
    <div class="daily-summary" id="summary-fpv"></div>
  </div>

  <!-- ОПТИКА -->
  <div class="table-box">
    <h2>БпЛА типу «ОПТИКА»</h2>
    <table id="table-optic"></table>
    <div class="daily-summary" id="summary-optic"></div>
  </div>

</div>

<script src="report.js" defer></script>
</body>
</html>
